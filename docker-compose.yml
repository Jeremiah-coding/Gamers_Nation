services:
  postgres:
    image: postgres:16-alpine
    container_name: gamers_nation_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: videogames_schema
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d videogames_schema"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
