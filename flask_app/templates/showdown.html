<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/flavicon.jpg/Bulbasaur.jpg" type="image/jpeg">
    <link rel="stylesheet" href="/static/showdown.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <title>Pokemon Showdown</title>
</head>
<body>
    <div class="dropdown">
        <button class="dropbtn">Menu</button>
        <div class="dropdown-content">
            <a href="/videogames">Hub</a>
            <a href="/videogames/form">Add A Videogame</a>
            <a href="/user/account">Account</a>
            <a href="/videogames/igdb/login">Twitch Hub</a>
            <a href="/users/logout">Logout</a>
        </div>
    </div>

    <header class="showdown-header">
        <h1>Pokemon Showdown Arena</h1>
        <p>Battle without leaving Gamers Nation.</p>
    </header>

    <main class="showdown-shell">
        <div class="showdown-frame-wrap">
            <iframe
                id="showdown-iframe"
                class="showdown-frame"
                src="https://play.pokemonshowdown.com/"
                title="Pokemon Showdown"
                loading="eager"
                referrerpolicy="strict-origin-when-cross-origin"
                allow="fullscreen; autoplay"
            ></iframe>
        </div>
        <div class="showdown-fallback" id="showdown-fallback">
            <p class="showdown-note">
                Embedding is blocked by Pokemon Showdown in this browser session.
            </p>
            <a href="https://play.pokemonshowdown.com/" class="showdown-launch-btn">Launch In This Tab</a>
            <a href="/videogames" class="showdown-back-link">Back to Hub</a>
        </div>
    </main>

    <script src="/static/app_music.js"></script>
    <script>
        window.GNMusic && window.GNMusic.init({ stopOnLoad: true });

        (function () {
            const iframe = document.getElementById('showdown-iframe');
            const fallback = document.getElementById('showdown-fallback');
            let loaded = false;

            if (!iframe || !fallback) {
                return;
            }

            iframe.addEventListener('load', function () {
                loaded = true;
                fallback.classList.remove('is-visible');
            });

            setTimeout(function () {
                if (!loaded) {
                    fallback.classList.add('is-visible');
                }
            }, 2600);
        })();
    </script>
</body>
</html>
